shared_cdn:
  host: giwmscdnone.gov.np
  path_patterns:
    - /media/pdf_upload/*.pdf
    - /media/app/public/*/posts/*.pdf
    - /media/carousels/*.{jpg,png,pdf}
  notes: "Single shared government CDN serves most agencies. Crawling this domain directly is a volume shortcut."

tls_policy:
  insecure_allowed: true
  rationale: "~27% of gov sites have broken cert chains. Crawler must use cert-tolerant mode AND log which sites needed it, as a trust signal."
