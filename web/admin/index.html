<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · helpdesk.ampixa.com</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🛠️%3C/text%3E%3C/svg%3E" />
  <style>
    :root {
      --bg: #0f172a;
      --bg-2: #1e293b;
      --bg-3: #334155;
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --primary: #38bdf8;
      --success: #34d399;
      --danger: #f87171;
      --warning: #fbbf24;
      --pending: #fbbf24;
      --approved: #34d399;
      --rejected: #94a3b8;
      --border: #334155;
      --radius: 10px;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f8fafc;
        --bg-2: #ffffff;
        --bg-3: #e2e8f0;
        --text: #0f172a;
        --text-dim: #475569;
        --border: #cbd5e1;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
      min-height: 100vh;
    }
    header {
      background: var(--bg-2);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 { font-size: 16px; font-weight: 600; flex: 1; }
    header h1 .sub { color: var(--text-dim); font-weight: 400; font-size: 13px; }
    header a { color: var(--text-dim); font-size: 13px; text-decoration: none; padding: 6px 10px; border-radius: 6px; }
    header a:hover { background: var(--bg-3); color: var(--text); }
    .refresh-btn {
      padding: 6px 12px;
      background: var(--bg-3);
      color: var(--text);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }

    main { max-width: 1100px; margin: 0 auto; padding: 24px 20px 60px; }
    .filter-row {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 6px 14px;
      background: var(--bg-2);
      color: var(--text-dim);
      border: 1px solid var(--border);
      border-radius: 16px;
      cursor: pointer;
      font-size: 13px;
    }
    .filter-btn.active { background: var(--primary); color: var(--bg); border-color: var(--primary); }

    .submission-list { display: flex; flex-direction: column; gap: 12px; }
    .sub-card {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
    }
    .sub-card.expanded { border-color: var(--primary); }
    .sub-head { display: flex; gap: 12px; align-items: center; cursor: pointer; }
    .sub-head .icon { width: 14px; color: var(--text-dim); font-family: monospace; }
    .sub-head .name { font-weight: 600; flex: 1; }
    .sub-head .office { color: var(--text-dim); font-size: 13px; }
    .sub-head .when { color: var(--text-dim); font-size: 12px; font-family: ui-monospace, "SF Mono", monospace; }
    .sub-head .counts { color: var(--text-dim); font-size: 12px; }
    .pill {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      letter-spacing: 0.5px;
    }
    .pill.pending { background: var(--pending); color: #1c1917; }
    .pill.approved { background: var(--approved); color: #064e3b; }
    .pill.rejected { background: var(--rejected); color: #1c1917; }

    .sub-body {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      display: none;
    }
    .sub-card.expanded .sub-body { display: block; }
    .sub-meta { font-size: 12px; color: var(--text-dim); font-family: ui-monospace, "SF Mono", monospace; margin-bottom: 14px; }

    .audio-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
    .audio-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
    }
    .audio-item .qid { font-size: 12px; color: var(--text-dim); font-family: monospace; margin-bottom: 4px; }
    .audio-item .question { font-size: 13px; margin-bottom: 6px; }
    .audio-item audio { width: 100%; height: 32px; }
    .audio-item .transcript {
      margin-top: 8px;
      font-size: 13px;
      background: var(--bg-2);
      border-left: 3px solid var(--success);
      padding: 8px 10px;
      border-radius: 4px;
      white-space: pre-wrap;
    }

    .photos-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
    .photos-row img {
      width: 100px; height: 100px; object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--border);
      cursor: pointer;
    }

    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn {
      padding: 9px 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-approve { background: var(--success); color: #064e3b; }
    .btn-reject { background: var(--danger); color: white; }
    .btn-secondary { background: var(--bg-3); color: var(--text); }

    .empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-dim);
    }
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-2);
      border: 1px solid var(--border);
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 100;
      display: none;
      box-shadow: 0 6px 24px rgba(0,0,0,0.4);
    }
    .toast.show { display: block; }
    .toast.error { border-color: var(--danger); color: var(--danger); }
    .toast.success { border-color: var(--success); color: var(--success); }
  </style>
</head>
<body>
  <header>
    <h1>Admin <span class="sub">· interview submissions</span></h1>
    <a href="/">home</a>
    <a href="/chat">chat</a>
    <a href="/interview">interview</a>
    <button class="refresh-btn" id="refreshBtn">↻ Refresh</button>
  </header>

  <main>
    <div class="filter-row">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="pending">Pending</button>
      <button class="filter-btn" data-filter="approved">Approved</button>
      <button class="filter-btn" data-filter="rejected">Rejected</button>
    </div>

    <div class="submission-list" id="list">
      <div class="empty">Loading…</div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const listEl = document.getElementById("list");
    const refreshBtn = document.getElementById("refreshBtn");
    const toast = document.getElementById("toast");
    let allSubs = [];
    let activeFilter = "all";

    function escapeHtml(s) {
      return (s || "").replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
    }

    function showToast(msg, kind) {
      toast.textContent = msg;
      toast.className = "toast show" + (kind ? " " + kind : "");
      setTimeout(() => { toast.className = "toast"; }, 3500);
    }

    async function loadSubmissions() {
      listEl.innerHTML = `<div class="empty">Loading…</div>`;
      try {
        const r = await fetch("/admin/submissions", { credentials: "include" });
        if (!r.ok) throw new Error("HTTP " + r.status);
        const data = await r.json();
        allSubs = data.submissions || [];
        render();
      } catch (e) {
        listEl.innerHTML = `<div class="empty" style="color:var(--danger)">Failed to load: ${escapeHtml(e.message || e)}</div>`;
      }
    }

    function render() {
      const filtered = activeFilter === "all"
        ? allSubs
        : allSubs.filter((s) => s.status === activeFilter);
      if (filtered.length === 0) {
        listEl.innerHTML = `<div class="empty">No submissions in this category.</div>`;
        return;
      }
      listEl.innerHTML = "";
      filtered.forEach((sub) => listEl.appendChild(renderCard(sub)));
    }

    function renderCard(sub) {
      const card = document.createElement("div");
      card.className = "sub-card";
      card.dataset.id = sub.id;
      const submittedAgo = formatAgo(sub.submitted_at);
      card.innerHTML = `
        <div class="sub-head">
          <span class="icon">▸</span>
          <span class="name">${escapeHtml(sub.name || "(no name)")}</span>
          <span class="office">${escapeHtml(sub.office || "")}</span>
          <span class="counts">🎤 ${(sub.audio || []).length} · 📷 ${(sub.photos || []).length}</span>
          <span class="when">${escapeHtml(submittedAgo)}</span>
          <span class="pill ${sub.status}">${sub.status}</span>
        </div>
        <div class="sub-body"></div>
      `;
      card.querySelector(".sub-head").addEventListener("click", () => toggleExpand(card, sub));
      return card;
    }

    function formatAgo(iso) {
      if (!iso) return "";
      const t = new Date(iso).getTime();
      const ago = Math.floor((Date.now() - t) / 1000);
      if (ago < 60) return ago + "s ago";
      if (ago < 3600) return Math.floor(ago / 60) + "m ago";
      if (ago < 86400) return Math.floor(ago / 3600) + "h ago";
      return Math.floor(ago / 86400) + "d ago";
    }

    async function toggleExpand(card, sub) {
      const wasExpanded = card.classList.contains("expanded");
      card.classList.toggle("expanded");
      const arrow = card.querySelector(".sub-head .icon");
      arrow.textContent = card.classList.contains("expanded") ? "▾" : "▸";
      if (wasExpanded) return;
      const body = card.querySelector(".sub-body");
      body.innerHTML = `<div class="empty">Loading…</div>`;
      try {
        const r = await fetch(`/admin/submission/${sub.id}`, { credentials: "include" });
        if (!r.ok) throw new Error("HTTP " + r.status);
        const detail = await r.json();
        renderDetail(body, detail);
      } catch (e) {
        body.innerHTML = `<div class="empty" style="color:var(--danger)">Failed: ${escapeHtml(e.message || e)}</div>`;
      }
    }

    function renderDetail(body, sub) {
      const transcripts = sub.transcripts || {};
      const audioHtml = (sub.audio || []).map((a) => {
        const qid = a.question_id;
        const tr = transcripts[qid];
        const trHtml = tr
          ? `<div class="transcript">${escapeHtml(tr)}</div>`
          : "";
        return `
          <div class="audio-item">
            <div class="qid">${escapeHtml(qid)} · ${a.bytes ? Math.round(a.bytes / 1024) + " KB" : ""}</div>
            <audio controls preload="metadata" src="/admin/audio/${escapeHtml(sub.id)}/${escapeHtml(a.filename)}"></audio>
            ${trHtml}
          </div>`;
      }).join("");

      const photoHtml = (sub.photos || []).length
        ? `<div class="photos-row">${
            sub.photos.map((p) =>
              `<img src="/admin/photo/${escapeHtml(sub.id)}/${escapeHtml(p.filename)}" alt="" onclick="window.open(this.src)">`
            ).join("")
          }</div>`
        : "";

      const meta = `id=${escapeHtml(sub.id)} · submitted ${escapeHtml(sub.submitted_at || "")} · ip ${escapeHtml(sub.ip || "")}`;
      let actions = "";
      if (sub.status === "pending") {
        actions = `
          <div class="actions">
            <button class="btn btn-approve" data-action="approve">✓ Approve & transcribe (Vertex)</button>
            <button class="btn btn-reject" data-action="reject">✕ Reject</button>
          </div>`;
      } else if (sub.status === "approved") {
        actions = `<div class="actions"><span style="color:var(--success);font-size:13px">✓ Approved at ${escapeHtml(sub.approved_at || "")} · transcripts above</span></div>`;
      } else if (sub.status === "rejected") {
        actions = `<div class="actions"><span style="color:var(--text-dim);font-size:13px">✕ Rejected at ${escapeHtml(sub.rejected_at || "")}</span></div>`;
      }

      body.innerHTML = `
        <div class="sub-meta">${meta}</div>
        <div class="audio-list">${audioHtml || "<em>no audio</em>"}</div>
        ${photoHtml}
        ${actions}
      `;

      body.querySelectorAll(".btn[data-action]").forEach((b) => {
        b.addEventListener("click", () => doAction(sub.id, b.dataset.action, b));
      });
    }

    async function doAction(id, action, btnEl) {
      if (action === "reject" && !confirm("Reject this submission? It will move to the rejected archive.")) return;
      const card = document.querySelector(`.sub-card[data-id="${id}"]`);
      btnEl.disabled = true;
      btnEl.textContent = action === "approve" ? "Transcribing via Vertex…" : "Rejecting…";
      try {
        const r = await fetch(`/admin/submission/${id}/${action}`, {
          method: "POST",
          credentials: "include",
        });
        if (!r.ok) {
          const t = await r.text();
          throw new Error(`HTTP ${r.status}: ${t.slice(0, 300)}`);
        }
        const j = await r.json();
        if (action === "approve") {
          const errs = j.transcribe_errors && Object.keys(j.transcribe_errors).length;
          showToast(
            `Approved · ${j.claims} claim(s) added · ${errs ? errs + " transcribe error(s)" : "no errors"}`,
            errs ? "" : "success"
          );
        } else {
          showToast("Rejected.", "");
        }
        await loadSubmissions();
      } catch (e) {
        showToast(`${action} failed: ${e.message || e}`, "error");
        btnEl.disabled = false;
        btnEl.textContent = action === "approve" ? "✓ Approve & transcribe (Vertex)" : "✕ Reject";
      }
    }

    document.querySelectorAll(".filter-btn").forEach((b) => {
      b.addEventListener("click", () => {
        document.querySelectorAll(".filter-btn").forEach((x) => x.classList.remove("active"));
        b.classList.add("active");
        activeFilter = b.dataset.filter;
        render();
      });
    });
    refreshBtn.addEventListener("click", loadSubmissions);

    loadSubmissions();
  </script>
</body>
</html>
