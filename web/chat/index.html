<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <title>Citizen Chat · helpdesk.ampixa.com</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🇳🇵%3C/text%3E%3C/svg%3E" />
  <style>
    :root {
      --bg: #0f172a;
      --bg-2: #1e293b;
      --bg-3: #334155;
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --primary: #38bdf8;
      --tacit-color: #34d399;
      --tacit-bg: #064e3b;
      --gov-color: #60a5fa;
      --gov-bg: #1e3a8a;
      --error: #f87171;
      --warning: #fbbf24;
      --user-bubble: #1d4ed8;
      --ai-bubble: #1e293b;
      --border: #334155;
      --radius: 12px;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f8fafc;
        --bg-2: #ffffff;
        --bg-3: #e2e8f0;
        --text: #0f172a;
        --text-dim: #475569;
        --tacit-bg: #d1fae5;
        --gov-bg: #dbeafe;
        --user-bubble: #2563eb;
        --ai-bubble: #f1f5f9;
        --border: #cbd5e1;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      line-height: 1.5;
    }
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--bg-2);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 { font-size: 16px; font-weight: 600; flex: 1; }
    header h1 .sub { color: var(--text-dim); font-weight: 400; font-size: 13px; }
    header a { color: var(--text-dim); font-size: 13px; text-decoration: none; padding: 6px 10px; border-radius: 6px; }
    header a:hover { background: var(--bg-3); color: var(--text); }

    main {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .empty-hint {
      background: var(--bg-2);
      border: 1px dashed var(--border);
      padding: 16px;
      border-radius: var(--radius);
      color: var(--text-dim);
      font-size: 14px;
    }
    .msg-row { display: flex; }
    .msg-row.user { justify-content: flex-end; }
    .bubble {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: var(--radius);
      word-wrap: break-word;
      white-space: pre-wrap;
      font-size: 15px;
    }
    .bubble.user { background: var(--user-bubble); color: white; }
    .bubble.ai { background: var(--ai-bubble); border: 1px solid var(--border); }
    .bubble.error { color: var(--error); border-color: var(--error); }
    .answer { white-space: normal; }
    .answer.streaming { white-space: pre-wrap; }
    .answer p { margin: 0 0 8px; }
    .answer p:last-child { margin-bottom: 0; }
    .answer ul, .answer ol { margin: 6px 0 8px 20px; }
    .answer li { margin: 2px 0; }
    .answer code {
      padding: 1px 4px;
      border-radius: 4px;
      background: rgba(148, 163, 184, 0.18);
      font-family: ui-monospace, "SF Mono", monospace;
      font-size: 0.92em;
    }
    .answer a { color: var(--primary); text-decoration: none; }
    .answer a:hover { text-decoration: underline; }
    .meta { margin-top: 6px; font-size: 11px; color: var(--text-dim); }
    .sources { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
    .src-card {
      padding: 8px 10px;
      border-radius: 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      font-size: 13px;
    }
    .src-card a { color: var(--primary); text-decoration: none; }
    .src-card a:hover { text-decoration: underline; }
    .src-card.tacit { background: var(--tacit-bg); border-color: var(--tacit-color); }
    .src-card.gov { background: var(--gov-bg); border-color: var(--gov-color); }
    .src-card .tag {
      display: inline-block; font-weight: 700; font-size: 10px;
      letter-spacing: 0.5px; padding: 2px 6px; border-radius: 4px; margin-right: 8px;
    }
    .src-card.tacit .tag { background: var(--tacit-color); color: #052e16; }
    .src-card.gov .tag { background: var(--gov-color); color: #1e1b4b; }
    .src-card .body { margin-top: 4px; opacity: 0.9; }
    .src-card .url {
      margin-top: 4px; font-size: 11px;
      font-family: ui-monospace, "SF Mono", monospace;
      opacity: 0.7; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .refusal-cta {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 8px; padding: 8px 14px; border-radius: 8px;
      background: var(--warning); color: #1c1917;
      text-decoration: none; font-weight: 600; font-size: 14px;
    }
    .refusal-cta:hover { opacity: 0.9; }

    .thinking {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 12px; color: var(--text-dim); font-size: 13px;
    }
    .spinner {
      width: 12px; height: 12px;
      border: 2px solid var(--text-dim); border-top-color: transparent;
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      background: var(--bg-2);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
    }
    .input-row {
      display: flex; gap: 8px;
      max-width: 800px; margin: 0 auto;
    }
    textarea {
      flex: 1; background: var(--bg); color: var(--text);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 10px 14px; font-family: inherit; font-size: 15px;
      resize: none; max-height: 120px;
    }
    textarea:focus { outline: 2px solid var(--primary); outline-offset: -1px; }
    .send-btn {
      width: 44px; height: 44px;
      border: none; border-radius: 50%;
      background: var(--primary); color: var(--bg);
      cursor: pointer; font-size: 18px;
      display: grid; place-items: center; align-self: flex-end;
    }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <h1>Citizen Chat <span class="sub">· helpdesk.ampixa.com</span></h1>
    <a href="/">← back</a>
    <a href="/interview">interview</a>
  </header>

  <main id="chat">
    <div class="empty-hint" id="emptyHint">
      Ask anything about Nepal-government services. Answers cite sources;
      if no authoritative source matches, the system refuses honestly.
      <br><br>
      Type in <strong>Nepali</strong>, <strong>Roman-Nepali</strong>, or <strong>English</strong>.
    </div>
  </main>

  <footer>
    <form class="input-row" id="form">
      <textarea id="input" placeholder="Ask in Nepali, Roman-Nepali, or English…" rows="1"></textarea>
      <button type="submit" class="send-btn" id="sendBtn" aria-label="Send" title="Send">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M3.4 20.4l17.45-7.48a1 1 0 0 0 0-1.84L3.4 3.6a1 1 0 0 0-1.39.92V9.5a1 1 0 0 0 .8.98L13 12 2.81 13.52a1 1 0 0 0-.8.98v4.98a1 1 0 0 0 1.39.92z"/></svg>
      </button>
    </form>
  </footer>

  <script>
    const chat = document.getElementById("chat");
    const emptyHint = document.getElementById("emptyHint");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");

    function escapeHtml(s) {
      return (s || "").replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
    }
    function linkHtml(url, label) {
      const safeUrl = escapeHtml(url);
      return `<a href="${safeUrl}" target="_blank" rel="noreferrer">${escapeHtml(label || url)}</a>`;
    }
    function renderInlineMarkdown(text) {
      const links = [];
      let html = escapeHtml(text || "");
      html = html.replace(/\[(https?:\/\/[^\]\s]+)\]/g, (_, url) => {
        const i = links.push(linkHtml(url, `[${url}]`)) - 1;
        return `\u0000${i}\u0000`;
      });
      html = html.replace(/(^|[\s(])(https?:\/\/[^\s<]+[^\s<.,;:!?])/g, (m, prefix, url) => {
        const i = links.push(linkHtml(url, url)) - 1;
        return `${prefix}\u0000${i}\u0000`;
      });
      html = html
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      return html.replace(/\u0000(\d+)\u0000/g, (_, i) => links[Number(i)] || "");
    }
    function renderMarkdown(text) {
      const lines = (text || "").replace(/\r\n/g, "\n").split("\n");
      const out = [];
      let paragraph = [];
      let listType = null;
      let listItems = [];
      function flushParagraph() {
        if (!paragraph.length) return;
        out.push(`<p>${paragraph.map(renderInlineMarkdown).join("<br>")}</p>`);
        paragraph = [];
      }
      function flushList() {
        if (!listType) return;
        out.push(`<${listType}>${listItems.map((x) => `<li>${renderInlineMarkdown(x)}</li>`).join("")}</${listType}>`);
        listType = null;
        listItems = [];
      }
      for (const line of lines) {
        if (!line.trim()) {
          flushParagraph();
          flushList();
          continue;
        }
        const bullet = line.match(/^\s*[-*]\s+(.+)$/);
        const numbered = line.match(/^\s*\d+\.\s+(.+)$/);
        if (bullet || numbered) {
          flushParagraph();
          const nextType = bullet ? "ul" : "ol";
          if (listType && listType !== nextType) flushList();
          listType = nextType;
          listItems.push((bullet || numbered)[1]);
          continue;
        }
        flushList();
        paragraph.push(line);
      }
      flushParagraph();
      flushList();
      return out.join("") || "<p></p>";
    }
    function addUserBubble(text) {
      emptyHint.style.display = "none";
      const row = document.createElement("div");
      row.className = "msg-row user";
      row.innerHTML = `<div class="bubble user">${escapeHtml(text)}</div>`;
      chat.appendChild(row);
      chat.scrollTop = chat.scrollHeight;
    }
    function addThinking() {
      const el = document.createElement("div");
      el.className = "thinking";
      el.id = "thinkingIndicator";
      el.innerHTML = `<div class="spinner"></div><span>Thinking…</span>`;
      chat.appendChild(el);
      chat.scrollTop = chat.scrollHeight;
      return el;
    }
    function removeThinking() {
      const el = document.getElementById("thinkingIndicator");
      if (el) el.remove();
    }
    function renderSources(sources) {
      return (sources || []).map((s) => {
        const cls = s.is_tacit ? "tacit" : "gov";
        const tagText = s.label || (s.is_tacit ? "CITIZEN INTERVIEW" : "GOV.NP");
        const metaBits = [];
        if (s.confidence) metaBits.push(s.confidence);
        if (s.interviewee_role) metaBits.push(s.interviewee_role);
        const metaText = metaBits.length ? "  ·  " + metaBits.join(" · ") : "";
        const url = s.url
          ? `<div class="url"><a href="${escapeHtml(s.url)}" target="_blank" rel="noreferrer">${escapeHtml(s.url)}</a></div>`
          : "";
        return `
          <div class="src-card ${cls}">
            <span class="tag">${tagText}</span><span class="meta">${escapeHtml(metaText)}</span>
            <div class="body">${escapeHtml(s.snippet || "")}</div>
            ${url}
          </div>`;
      }).join("");
    }
    function renderRefusalCta(resp) {
      return resp.did_refuse
        ? `<a class="refusal-cta" href="tel:1111">📞 Call Hello Sarkar 1111</a>`
        : "";
    }
    function metaText(resp, streaming = false) {
      return [
        resp.detected_lang || "language pending",
        resp.latency_ms?.total != null ? `${resp.latency_ms.total} ms` : (streaming ? "streaming" : "0 ms"),
        `${resp.retrieved_tacit ?? 0} tacit + ${resp.retrieved_gov ?? 0} gov`,
      ].join(" · ");
    }
    function addAiBubble(resp) {
      const row = document.createElement("div");
      row.className = "msg-row";
      const sourcesHtml = renderSources(resp.sources);
      row.innerHTML = `
        <div class="bubble ai">
          <div class="answer">${renderMarkdown(resp.answer)}</div>
          ${renderRefusalCta(resp)}
          ${sourcesHtml ? `<div class="sources">${sourcesHtml}</div>` : ""}
          <div class="meta">${escapeHtml(metaText(resp))}</div>
        </div>`;
      chat.appendChild(row);
      chat.scrollTop = chat.scrollHeight;
    }
    function addStreamingAiBubble() {
      const row = document.createElement("div");
      row.className = "msg-row";
      row.innerHTML = `
        <div class="bubble ai">
          <div class="answer streaming"></div>
          <div class="refusal-slot"></div>
          <div class="sources" style="display:none"></div>
          <div class="meta">streaming</div>
        </div>`;
      chat.appendChild(row);
      const answerEl = row.querySelector(".answer");
      const refusalEl = row.querySelector(".refusal-slot");
      const sourcesEl = row.querySelector(".sources");
      const metaEl = row.querySelector(".meta");
      chat.scrollTop = chat.scrollHeight;
      return {
        row,
        sawToken: false,
        append(text) {
          this.sawToken = true;
          answerEl.textContent += text;
          chat.scrollTop = chat.scrollHeight;
        },
        setMeta(resp) {
          metaEl.textContent = metaText(resp, true);
          const sourcesHtml = renderSources(resp.sources);
          if (sourcesHtml) {
            sourcesEl.innerHTML = sourcesHtml;
            sourcesEl.style.display = "";
          }
        },
        finalize(resp) {
          answerEl.classList.remove("streaming");
          answerEl.innerHTML = renderMarkdown(resp.answer);
          refusalEl.innerHTML = renderRefusalCta(resp);
          const sourcesHtml = renderSources(resp.sources);
          sourcesEl.innerHTML = sourcesHtml;
          sourcesEl.style.display = sourcesHtml ? "" : "none";
          metaEl.textContent = metaText(resp);
          chat.scrollTop = chat.scrollHeight;
        },
      };
    }
    async function readSse(response, handlers) {
      if (!response.body?.getReader) throw new Error("Streaming is not supported by this browser.");
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      function dispatch(block) {
        let event = "message";
        const dataLines = [];
        for (const line of block.split("\n")) {
          if (line.startsWith("event:")) event = line.slice(6).trim();
          if (line.startsWith("data:")) dataLines.push(line.slice(5).trimStart());
        }
        if (!dataLines.length) return;
        const data = JSON.parse(dataLines.join("\n"));
        if (handlers[event]) handlers[event](data);
      }
      while (true) {
        const { value, done } = await reader.read();
        buffer += decoder.decode(value || new Uint8Array(), { stream: !done });
        let idx;
        while ((idx = buffer.indexOf("\n\n")) >= 0) {
          const block = buffer.slice(0, idx);
          buffer = buffer.slice(idx + 2);
          if (block.trim()) dispatch(block);
        }
        if (done) break;
      }
      if (buffer.trim()) dispatch(buffer);
    }
    async function postJson(q) {
      const r = await fetch("/query", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          question: q,
          top_k_tacit: 3,
          top_k_gov: 3,
          max_new_tokens: 300,
        }),
      });
      if (!r.ok) {
        const t = await r.text();
        throw new Error(`HTTP ${r.status}: ${t.slice(0, 200)}`);
      }
      return r.json();
    }
    async function postStream(q, handlers) {
      const r = await fetch("/query/stream", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          question: q,
          top_k_tacit: 3,
          top_k_gov: 3,
          max_new_tokens: 300,
        }),
      });
      if (!r.ok) {
        const t = await r.text();
        throw new Error(`HTTP ${r.status}: ${t.slice(0, 200)}`);
      }
      await readSse(r, handlers);
    }
    function addErrorBubble(msg) {
      const row = document.createElement("div");
      row.className = "msg-row";
      row.innerHTML = `<div class="bubble ai error">Error: ${escapeHtml(msg)}</div>`;
      chat.appendChild(row);
      chat.scrollTop = chat.scrollHeight;
    }

    input.addEventListener("input", () => {
      input.style.height = "auto";
      input.style.height = Math.min(120, input.scrollHeight) + "px";
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const q = input.value.trim();
      if (!q) return;
      addUserBubble(q);
      input.value = "";
      input.style.height = "auto";
      sendBtn.disabled = true;
      addThinking();
      try {
        removeThinking();
        let finalReceived = false;
        let streamBubble = null;
        try {
          streamBubble = addStreamingAiBubble();
          await postStream(q, {
            meta: (data) => streamBubble.setMeta(data),
            token: (data) => streamBubble.append(data.text || ""),
            final: (data) => {
              finalReceived = true;
              streamBubble.finalize(data);
            },
            error: (data) => { throw new Error(data.message || "streaming failed"); },
          });
          if (!finalReceived) throw new Error("stream ended before final answer");
        } catch (streamErr) {
          if (streamBubble) streamBubble.row.remove();
          const j = await postJson(q);
          addAiBubble(j);
        }
      } catch (err) {
        removeThinking();
        addErrorBubble(err.message || String(err));
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    });

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        form.requestSubmit();
      }
    });
  </script>
</body>
</html>
